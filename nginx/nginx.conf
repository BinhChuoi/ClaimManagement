events { worker_connections 1024; }

http {
  upstream cmp_backend {
    server cmp-app:8080 max_fails=3 fail_timeout=30s;
    # Passive health check:
    # max_fails=3    → mark server down after 3 consecutive errors
    # fail_timeout=30s → keep it down for 30s, then retry
  }

  server {
    listen 80;

    location / {
      proxy_pass         http://cmp_backend;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 120s;

      # On error automatically retry on the next available replica
      # Client never sees 502/503 as long as another replica is healthy
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
    }
  }
}
