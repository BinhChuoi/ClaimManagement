services:

  # ── CMP Spring Boot App (scalable) ───────────────────────────
  cmp-app:
    build:
      context: ./cmp
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: test123
      AWS_REGION: us-east-1
      ENABLE_INITIAL_LOAD: "true"
      # Point AWS SDK to the mounted credentials — works regardless of which user runs the JVM
      AWS_SHARED_CREDENTIALS_FILE: /app/.aws/credentials
      AWS_CONFIG_FILE: /app/.aws/config
    volumes:
      - ${USERPROFILE}/.aws:/app/.aws:ro
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    deploy:
      replicas: 2
    labels:
      - "traefik.enable=true"
      # Route all traffic through Traefik
      - "traefik.http.routers.cmp.rule=PathPrefix(`/`)"
      - "traefik.http.routers.cmp.entrypoints=web"
      - "traefik.http.services.cmp.loadbalancer.server.port=8080"
      # Active readiness health check — Traefik polls this every 10s
      # Only routes to instances that return 200 {"status":"UP"}
      - "traefik.http.services.cmp.loadbalancer.healthcheck.path=/actuator/health/readiness"
      - "traefik.http.services.cmp.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.cmp.loadbalancer.healthcheck.timeout=5s"

  # ── Traefik load balancer (active health checks) ─────────────
  # Actively polls /actuator/health/readiness on each cmp-app replica
  # Auto-discovers new replicas when you docker compose up --scale cmp-app=N
  traefik:
    image: traefik:v3
    container_name: cmp-traefik
    ports:
      - "8080:80"     # app traffic
      - "8081:8081"   # Traefik dashboard (http://localhost:8081)
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.traefik.address=:8081"
      - "--log.level=WARN"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: on-failure

  # ── PostgreSQL ────────────────────────────────────────────────
  db:
    build: .
    container_name: invoice-test-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test123
      POSTGRES_DB: invoices
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=4MB
        -c checkpoint_completion_target=0.9
        -c log_checkpoints=on
        -c log_min_duration_statement=500
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c pg_stat_statements.max=10000
    volumes:
      - invoice_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d invoices"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── PostgreSQL Exporter (exposes PG metrics for Prometheus) ──
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:test123@db:5432/invoices?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: "/etc/postgres-exporter/queries.yaml"
    volumes:
      - ./monitoring/queries.yaml:/etc/postgres-exporter/queries.yaml
    depends_on:
      db:
        condition: service_healthy

  # ── Prometheus (scrapes metrics every 15s) ────────────────────
  prometheus:
    image: quay.io/prometheus/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - postgres-exporter

  # ── Grafana (dashboards on port 3000) ─────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      # Allow iframes in text panels to load from localhost:8088 (App Manager)
      GF_SECURITY_CONTENT_SECURITY_POLICY: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  invoice_pgdata:
  prometheus_data:
  grafana_data:
