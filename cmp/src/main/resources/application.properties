spring.application.name=cmp

# ── DataSource (Docker PostgreSQL) ───────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/invoices
spring.datasource.username=postgres
spring.datasource.password=test123
spring.datasource.driver-class-name=org.postgresql.Driver

# ── AWS Athena ───────────────────────────────────────────────
aws.region=us-east-1
aws.athena.workgroup=levelupjourney-datalake-workgroup
aws.athena.database=invoices_db
aws.athena.poll-interval-ms=2000
aws.athena.max-poll-attempts=60

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Batch inserts — groups multiple INSERTs into one round-trip
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
