spring.application.name=cmp
server.port=${SERVER_PORT:8080}

# ── DataSource ────────────────────────────────────────────────
# DB_HOST defaults to localhost (dev) — override to 'db' inside Docker
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/invoices
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:test123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ── AWS ──────────────────────────────────────────────────────
aws.region=${AWS_REGION:us-east-1}
aws.athena.workgroup=${AWS_ATHENA_WORKGROUP:levelupjourney-datalake-workgroup}
aws.athena.database=${AWS_ATHENA_DATABASE:invoices_db}
aws.athena.poll-interval-ms=2000
aws.athena.max-poll-attempts=60

# ── S3 Data Lake ─────────────────────────────────────────────
aws.s3.datalake-bucket=${AWS_S3_BUCKET:levelupjourney-datalake-930388172688}
aws.s3.processed-prefix=processed

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── Feature flags ────────────────────────────────────────────
app.enable-initial-load=${ENABLE_INITIAL_LOAD:true}

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
# Separate liveness (/actuator/health/liveness) and readiness (/actuator/health/readiness)
management.health.probes.enabled=true

# ── Spring Batch ─────────────────────────────────────────────
spring.batch.jdbc.initialize-schema=never
spring.batch.job.enabled=false
