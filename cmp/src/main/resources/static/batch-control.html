<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batch Job Control</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, sans-serif; background: #111217; color: #d0d0d0; font-size: 13px; padding: 10px; }
  h3 { color: #fff; margin-bottom: 8px; font-size: 14px; }
  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .btn { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500; }
  .btn-refresh { background: #1f60c4; color: #fff; }
  .btn-restart { background: #e67e22; color: #fff; }
  .btn-stop    { background: #c0392b; color: #fff; }
  .msg { padding: 4px 8px; border-radius: 4px; background: #1a3a5c; color: #7eb8f7; font-size: 12px; flex: 1; min-height: 26px; line-height: 18px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 6px 8px; background: #1c1e24; color: #8a8a8a; font-weight: 500; border-bottom: 1px solid #2e2e3e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 6px 8px; border-bottom: 1px solid #1e1e2e; vertical-align: middle; }
  tr:hover td { background: #1a1a2e; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
  .COMPLETED { background: #1a5c1a; color: #7adc7a; }
  .FAILED    { background: #5c1a1a; color: #dc7a7a; }
  .STARTED, .STARTING { background: #1a3a5c; color: #7ab8dc; }
  .STOPPED   { background: #3a3a1a; color: #dcdc7a; }
  .mono { font-family: monospace; font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<h3>Batch Job Control</h3>
<div class="toolbar">
  <button class="btn btn-refresh" onclick="load()">⟳ Refresh</button>
  <div class="msg" id="msg"></div>
</div>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Job IDs</th>
      <th>Status</th>
      <th>Started</th>
      <th>Ended</th>
      <th>Steps</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="tbody"><tr><td colspan="7" style="color:#666;text-align:center;padding:20px">Loading...</td></tr></tbody>
</table>

<script>
const API = 'http://localhost:8080/admin/batch';

function load() {
  fetch(API + '/jobs')
    .then(r => r.json())
    .then(jobs => {
      if (!jobs.length) {
        document.getElementById('tbody').innerHTML =
          '<tr><td colspan="7" style="color:#666;text-align:center;padding:20px">No job executions yet</td></tr>';
        return;
      }
      document.getElementById('tbody').innerHTML = jobs.map(j => `
        <tr>
          <td><b>#${j.executionId}</b></td>
          <td class="mono">${(j.jobIds || '-').replace(/,/g, ', ')}</td>
          <td><span class="badge ${j.status}">${j.status}</span></td>
          <td class="mono">${j.startTime ? new Date(j.startTime).toLocaleString() : '-'}</td>
          <td class="mono">${j.endTime   ? new Date(j.endTime).toLocaleString()   : '-'}</td>
          <td style="text-align:center">${j.stepCount}</td>
          <td style="display:flex;gap:4px">
            ${j.status === 'FAILED'
              ? `<button class="btn btn-restart" onclick="restart(${j.executionId})">↺ Restart</button>`
              : ''}
            ${j.status === 'STARTED' || j.status === 'STARTING'
              ? `<button class="btn btn-stop" onclick="stop_(${j.executionId})">■ Stop</button>`
              : ''}
          </td>
        </tr>`).join('');
    })
    .catch(e => setMsg('Error loading jobs: ' + e, true));
}

function restart(id) {
  setMsg('Restarting #' + id + '...');
  fetch(API + '/restart/' + id, { method: 'POST' })
    .then(r => r.json())
    .then(d => { setMsg('✓ Restarted! New execution ID: ' + d.newExecutionId); load(); })
    .catch(e => setMsg('Error: ' + e, true));
}

function stop_(id) {
  setMsg('Stopping #' + id + '...');
  fetch(API + '/stop/' + id, { method: 'POST' })
    .then(r => r.json())
    .then(d => { setMsg('✓ Stopped execution #' + id); load(); })
    .catch(e => setMsg('Error: ' + e, true));
}

function setMsg(m, err) {
  const el = document.getElementById('msg');
  el.textContent = m;
  el.style.background = err ? '#3a1a1a' : '#1a3a5c';
  el.style.color = err ? '#dc7a7a' : '#7eb8f7';
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
